    <text x="58"  y="67">Raw bytes</text>
    <text x="180" y="67">Disassembly</text>
    <text x="302" y="60">Control-flow<tspan x="302" dy="16">graph</tspan></text>
    <text x="424" y="67">Lift to IR</text>
    <text x="546" y="60">Variable<tspan x="546" dy="16">recovery</tspan></text>
